

<h2>Book List</h2>

<p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

<div *ngIf="!errorMessage && books.length === 0" class="empty-message">
  No books available yet.
</div>

<div *ngFor="let book of books" class="book-card">
  <h3>{{ book.title }}</h3>
  <p><strong>Author:</strong> {{ book.author }}</p>
  <p><strong>Description:</strong> {{ book.description }}</p>

<div *ngIf="book.cover_image" class="cover-preview">
  <p><strong>Cover:</strong></p>
  <img
    [src]="'http://localhost/angular-api/uploads/' + book.cover_image"
    [alt]="book.title + ' cover'"
  />
</div>

  <div class="button-group">
    <button *ngIf="book.id" [routerLink]="['/update', book.id]">Update</button>
    <button *ngIf="book.id" (click)="deleteBook(book.id)">Delete</button>
  </div>
</div>
