

<h2>Register</h2>

<p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
  <div class="form-group">
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" />

    <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('required')">
      Email is required.
    </small>

    <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('email')">
      Enter a valid email address.
    </small>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" type="password" formControlName="password" />

    <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('required')">
      Password is required.
    </small>

    <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('minlength')">
      Password must be at least 6 characters long.
    </small>
  </div>

  <button type="submit">Register</button>
</form>
