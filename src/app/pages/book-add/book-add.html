

<h2>Add a New Book</h2>

<p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

<form [formGroup]="bookForm" (ngSubmit)="onSubmit()" class="book-form">
  <div class="form-group">
    <label for="title">Title</label>
    <input id="title" type="text" formControlName="title" />

    <small *ngIf="bookForm.get('title')?.touched && bookForm.get('title')?.invalid">
      Title is required.
    </small>
  </div>

  <div class="form-group">
    <label for="author">Author</label>
    <input id="author" type="text" formControlName="author" />

    <small *ngIf="bookForm.get('author')?.touched && bookForm.get('author')?.invalid">
      Author is required.
    </small>
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" rows="5" formControlName="description"></textarea>

    <small *ngIf="bookForm.get('description')?.touched && bookForm.get('description')?.invalid">
      Description is required.
    </small>
  </div>

  <button type="submit">Add Book</button>
</form>
